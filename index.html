<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BPM Detector PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #611214;
  --panel:      #1a1c20;
  --panel2:     #1e2024;
  --border:     #2e3138;
  --amber:      #ffb347;
  --amber-dim:  #6b3d00;
  --amber-glow: #ffb34750;
  --green:      #39ff8a;
  --green-dim:  #0a3320;
  --green-glow: #39ff8a40;
  --cyan:       #00e5ff;
  --red:        #ff4655;
  --red-dim:    #3d0008;
  --text-muted: #5a6070;
  --text:       #c8d0dc;
}

html, body {
  background: #0c0d0f;
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 10px 32px;
}

/* ── RACK SHELL ── */
.rack {
  width: 100%;
  max-width: 480px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 8px 40px #00000099, inset 0 1px 0 #ffffff08;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
.rack-header {
  background: linear-gradient(180deg, #23262d, #1a1c22);
  border-bottom: 2px solid #0d0e10;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.screw {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #3a3f4a, #1a1c20);
  border: 1px solid #0d0e10;
  flex-shrink: 0;
}
.brand {
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--text-muted);
}
.rack-title {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--text);
  flex: 1;
}
.led-power {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #0a2218;
  border: 1px solid #061410;
  transition: background 0.3s, box-shadow 0.3s;
  flex-shrink: 0;
}
.led-power.on {
  background: var(--green);
  box-shadow: 0 0 8px var(--green), 0 0 20px var(--green-glow);
}

/* ── BPM DISPLAY ── */
.bpm-section {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 18px 12px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.bpm-left { display: flex; flex-direction: column; }
.bpm-label {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--text-muted);
  margin-bottom: 2px;
}
#bpm {
  font-family: 'Orbitron', monospace;
  font-size: clamp(64px, 22vw, 88px);
  font-weight: 900;
  line-height: 1;
  color: var(--amber);
  text-shadow: 0 0 24px var(--amber-glow);
  letter-spacing: -2px;
  transition: color 0.2s, text-shadow 0.2s;
}
#bpm.locked {
  color: var(--green);
  text-shadow: 0 0 24px var(--green-glow);
}
.bpm-unit {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--text-muted);
  margin-top: 2px;
}
.state-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: 3px;
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  border: 1px solid transparent;
  transition: all 0.2s;
  align-self: flex-end;
  margin-bottom: 4px;
}
.state-badge.silence { background: #1a1c22; color: var(--text-muted); border-color: var(--border); }
.state-badge.tracking { background: #1a1800; color: var(--amber); border-color: #3d3000; }
.state-badge.locked {
  background: var(--green-dim); color: var(--green); border-color: #0e4028;
  box-shadow: 0 0 10px var(--green-glow);
}
.state-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.state-badge.locked .state-dot { animation: blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── BEAT FLASH ── */
.beat-strip { height: 3px; background: var(--border); flex-shrink: 0; }
.beat-flash-bar { height: 100%; width: 100%; background: var(--green); box-shadow: 0 0 10px var(--green); opacity: 0; transition: opacity 0.05s; }

/* ── VU + SCOPE : COLONNE ── */
.meters-col {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}

/* VU Meter horizontal */
.vu-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px 6px;
  border-bottom: 1px solid #1a1e24;
}
.vu-label {
  font-size: 9px; letter-spacing: 3px; color: var(--text-muted);
  flex-shrink: 0; width: 30px;
}
.vu-bar-h {
  flex: 1; height: 10px;
  background: #0d1014;
  border-radius: 3px;
  border: 1px solid #1a1e24;
  overflow: hidden;
  position: relative;
}
.vu-fill-h {
  height: 100%; width: 0%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--cyan) 0%, var(--green) 55%, var(--amber) 80%, var(--red) 100%);
  transition: width 0.04s;
}
#db-label {
  font-size: 9px; color: var(--text-muted);
  flex-shrink: 0; width: 52px; text-align: right;
}

/* Oscilloscope */
.scope-wrap {
  padding: 6px 14px 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.scope-label { font-size: 9px; letter-spacing: 3px; color: var(--text-muted); }
#wave {
  width: 100%; height: 70px; display: block;
  border-radius: 3px;
  background: #080a0c;
  border: 1px solid #1a1e24;
}

/* ── BEAT GRID ── */
.history-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 14px;
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  flex-wrap: nowrap;
}
.history-label {
  font-size: 9px; letter-spacing: 2px; color: var(--text-muted);
  margin-left: auto; flex-shrink: 0;
}
.history-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.2s, box-shadow 0.2s;
}
.history-dot.active {
  background: var(--amber);
  box-shadow: 0 0 5px var(--amber-glow);
}

/* ── CONTROLS : colonne propre ── */
.controls-panel {
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.ctrl-group { display: flex; flex-direction: column; gap: 6px; }
.ctrl-label {
  font-size: 9px; letter-spacing: 3px; color: var(--text-muted);
  display: flex; justify-content: space-between;
}
.ctrl-val { color: var(--amber); }

input[type=range] {
  -webkit-appearance: none;
  width: 100%; height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;   /* plus grand pour doigt */
  border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 6px var(--amber-glow);
  border: 2px solid var(--bg);
  cursor: pointer;
}

/* ── MODE SELECTOR ── */
.mode-panel {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.mode-label {
  font-size: 9px; letter-spacing: 3px; color: var(--text-muted);
}
.mode-btns {
  display: flex;
  gap: 8px;
}
.mode-btn {
  flex: 1;
  padding: 9px 8px;
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.mode-btn:active { opacity: 0.7; }
.mode-btn.active-tap {
  background: #1a1800;
  color: var(--amber);
  border-color: #3d3000;
  box-shadow: 0 0 10px #ffb34730;
}
.mode-btn.active-music {
  background: #001a2e;
  color: var(--cyan);
  border-color: #003d5c;
  box-shadow: 0 0 10px #00e5ff30;
}

/* ── MUSIC MODE : panneau d'état autocorrélation ── */
.acorr-panel {
  display: none;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px 10px;
  flex-direction: column;
  gap: 5px;
}
.acorr-panel.visible { display: flex; }
.acorr-label { font-size: 9px; letter-spacing: 3px; color: var(--text-muted); }
#acorr-canvas {
  width: 100%; height: 48px; display: block;
  border-radius: 3px;
  background: #080a0c;
  border: 1px solid #1a1e24;
}
.acorr-info {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: var(--text-muted);
}
#acorr-confidence { color: var(--cyan); }

/* contrôles spécifiques MUSIC (masqués en mode TAP) */
.ctrl-music-only { display: none; }
.ctrl-music-only.visible { display: flex; }

/* contrôles spécifiques TAP (masqués en mode MUSIC) */
.ctrl-tap-only { display: flex; }
.ctrl-tap-only.hidden { display: none; }

/* ── BOUTONS ── */
.btn-panel {
  padding: 12px 14px;
  display: flex;
  gap: 10px;
  align-items: center;
  background: var(--panel);
}
#btn-toggle {
  flex: 1; padding: 14px 16px;
  font-family: 'Orbitron', monospace;
  font-size: 12px; font-weight: 700; letter-spacing: 3px;
  border: none; border-radius: 5px; cursor: pointer;
  background: var(--green-dim); color: var(--green);
  border: 1px solid #1a4030;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
#btn-toggle:active { opacity: 0.8; }
#btn-toggle.running { background: var(--red-dim); color: var(--red); border-color: #4d0010; }
#btn-reset {
  padding: 14px 14px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; letter-spacing: 2px;
  border: 1px solid var(--border); border-radius: 5px;
  cursor: pointer; background: transparent; color: var(--text-muted);
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
#btn-reset:active { color: var(--text); }

/* ── FOOTER ── */
.rack-footer {
  background: linear-gradient(180deg, #16181e, #111214);
  border-top: 1px solid var(--border);
  padding: 7px 14px;
  display: flex; justify-content: space-between;
}
.rack-footer span { font-size: 9px; letter-spacing: 2px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="rack">

  <!-- HEADER -->
  <div class="rack-header">
    <div class="screw"></div>
    <span class="brand">STUDIO</span>
    <span class="rack-title">BPM DETECTOR CHATty</span>
    <div class="led-power" id="led-power"></div>
    <div class="screw"></div>
  </div>

  <!-- BPM DISPLAY -->
  <div class="bpm-section">
    <div class="bpm-left">
      <div class="bpm-label">TEMPO</div>
      <div id="bpm">--</div>
      <div class="bpm-unit">BPM</div>
    </div>
    <div class="state-badge silence" id="state-badge">
      <div class="state-dot"></div>
      <span id="state-text">SILENCE</span>
    </div>
  </div>

  <!-- BEAT FLASH STRIP -->
  <div class="beat-strip"><div class="beat-flash-bar" id="beat-flash"></div></div>

  <!-- VU + SCOPE en colonne -->
  <div class="meters-col">
    <div class="vu-wrap">
      <div class="vu-label">BASS</div>
      <div class="vu-bar-h"><div class="vu-fill-h" id="vu-fill"></div></div>
      <div id="db-label">-∞ dB</div>
    </div>
    <div class="scope-wrap">
      <div class="scope-label">WAVEFORM</div>
      <canvas id="wave"></canvas>
    </div>
  </div>

  <!-- BEAT GRID -->
  <div class="history-row" id="history-row">
    <div class="history-label">BEAT GRID</div>
  </div>

  <!-- MODE SELECTOR -->
  <div class="mode-panel">
    <div class="mode-label">MODE</div>
    <div class="mode-btns">
      <button class="mode-btn active-tap" id="btn-mode-tap"   onclick="setMode('tap')">🥁 TAP / CLAP</button>
      <button class="mode-btn"            id="btn-mode-music" onclick="setMode('music')">🎵 MUSIQUE</button>
    </div>
  </div>

  <!-- AUTOCORRELATION VISUALIZER (music mode only) -->
  <div class="acorr-panel" id="acorr-panel">
    <div class="acorr-label">AUTOCORRÉLATION · FLUX SPECTRAL</div>
    <canvas id="acorr-canvas"></canvas>
    <div class="acorr-info">
      <span>ANALYSE EN COURS…</span>
      <span>CONFIANCE : <span id="acorr-confidence">--</span></span>
    </div>
    <!-- Fix 5 : seuil de lock configurable -->
    <div class="ctrl-group" style="margin-top:6px">
      <div class="ctrl-label">SEUIL LOCK <span class="ctrl-val" id="lock-thresh-val">0.18</span> <span style="color:var(--text-muted);font-size:8px">(brut : <span id="acorr-raw">--</span>)</span></div>
      <input type="range" id="lock-thresh" min="0.05" max="0.50" step="0.01" value="0.18">
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-panel">
    <div class="ctrl-group ctrl-tap-only" id="ctrl-sens">
      <div class="ctrl-label">SENSIBILITÉ <span class="ctrl-val" id="sens-val">1.8</span></div>
      <input type="range" id="sens" min="1.2" max="3" step="0.1" value="1.8">
    </div>
    <div class="ctrl-group ctrl-tap-only" id="ctrl-smooth">
      <div class="ctrl-label">LISSAGE BPM <span class="ctrl-val" id="smooth-val">0.75</span></div>
      <input type="range" id="smooth" min="0.5" max="0.95" step="0.01" value="0.75">
    </div>
    <div class="ctrl-group ctrl-tap-only" id="ctrl-refrac">
      <div class="ctrl-label">REFRACTORY (ms) <span class="ctrl-val" id="refrac-val">180</span></div>
      <input type="range" id="refrac" min="100" max="400" step="10" value="180">
    </div>
    <!-- Contrôle MUSIC uniquement -->
    <div class="ctrl-group ctrl-music-only" id="ctrl-acorr-smooth">
      <div class="ctrl-label">LISSAGE BPM MUSIQUE <span class="ctrl-val" id="msmooth-val">0.85</span></div>
      <input type="range" id="msmooth" min="0.5" max="0.97" step="0.01" value="0.85">
    </div>
  </div>

  <!-- BOUTONS -->
  <div class="btn-panel">
    <button id="btn-toggle" onclick="toggle()">▶ START</button>
    <button id="btn-reset" onclick="resetState()">RESET</button>
  </div>

  <!-- FOOTER -->
  <div class="rack-footer">
    <span id="footer-mode-label">BASS ONSET DETECTION</span>
    <span>v3.0</span>
  </div>

</div>

<script>

// ============================================================
// AUDIO
// ============================================================

let ctx, analyser, src, stream;
let running = false;

// ============================================================
// MODE
// ============================================================

let currentMode = 'tap';

function setMode(m) {

  if (running) return;

  currentMode = m;

  const isTap = m === 'tap';

  document.getElementById('btn-mode-tap').className =
    'mode-btn' + (isTap ? ' active-tap' : '');

  document.getElementById('btn-mode-music').className =
    'mode-btn' + (!isTap ? ' active-music' : '');

  // Autocorrelation panel
  document.getElementById('acorr-panel')
    .classList.toggle('visible', !isTap);

  // Fix 7 : unified class-based visibility, no more inline style
  document.querySelectorAll('.ctrl-tap-only')
    .forEach(el => el.classList.toggle('hidden', !isTap));

  document.querySelectorAll('.ctrl-music-only')
    .forEach(el => el.classList.toggle('visible', !isTap));

  // Fix 2 : footer always consistent with current mode
  document.getElementById('footer-mode-label')
    .textContent =
      isTap
        ? 'BASS ONSET DETECTION'
        : 'SPECTRAL FLUX · AUTOCORRÉLATION';

  // Fix 2 : reset display state on mode switch
  resetState();
}

// ============================================================
// TAP MODE STATE
// ============================================================

let energyHistory = [];
let onsetHistory  = [];
let beatTimes     = [];

let lastBeat      = 0;
let lastOnsetTime = 0;
let smoothedBpm   = null;

let flashTimeout  = null;

// ============================================================
// PARAMS
// ============================================================

let SENS   = 1.8;
let SMOOTH = 0.75;
let REFRAC = 180;

const BPM_TIMEOUT = 2500;
const HIST_COUNT  = 16;

// ============================================================
// MUSIC MODE PARAMS
// ============================================================

let MSMOOTH = 0.85;

let LOCK_THRESH = 0.18;   // Fix 5 : seuil configurable

const AC_FFT_SIZE = 4096;

const AC_HOP_RATE = 20;
const AC_BUF_SEC  = 8;

let acBufLen      = 0;
let acBuf         = null;
let acBufPtr      = 0;
let acBufFull     = false;

let acPrevMag     = null;

let acSmoothedBpm = null;
let acLastUpdate  = 0;

let acFluxSmooth  = 0;

let acLastSampleTime = 0;

// ============================================================
// PRE-ALLOCATED BUFFERS (évite les allocations dans rAF)
// ============================================================

let _tapTimeDomain  = null;   // Float32Array, taille analyser.fftSize
let _tapFreqBins    = null;   // Uint8Array,   taille frequencyBinCount
let _musTimeDomain  = null;   // Float32Array, taille analyser.fftSize
let _musFreqBins    = null;   // Float32Array, taille frequencyBinCount

// ============================================================
// UI REFS
// ============================================================

const bpmEl      = document.getElementById('bpm');
const dbLabel    = document.getElementById('db-label');
const vuFill     = document.getElementById('vu-fill');

const stateBadge = document.getElementById('state-badge');
const stateText  = document.getElementById('state-text');

const beatFlash  = document.getElementById('beat-flash');

const ledPower   = document.getElementById('led-power');

const btnToggle  = document.getElementById('btn-toggle');

const histRow    = document.getElementById('history-row');

const canvas     = document.getElementById('wave');
const cctx       = canvas.getContext('2d');

const acCanvas     = document.getElementById('acorr-canvas');
const acCtx        = acCanvas.getContext('2d');
const acConfidence = document.getElementById('acorr-confidence');
const acorrRaw     = document.getElementById('acorr-raw');   // Fix 5

// ============================================================
// BUILD GRID
// ============================================================

const histLabel = histRow.querySelector('.history-label');

const histDots = [];

for (let i = 0; i < HIST_COUNT; i++) {

  const d = document.createElement('div');

  d.className = 'history-dot';

  histRow.insertBefore(d, histLabel);

  histDots.push(d);
}

// ============================================================
// CONTROLS
// ============================================================

document.getElementById('sens').oninput = e => {

  SENS = +e.target.value;

  document.getElementById('sens-val')
    .textContent = SENS.toFixed(1);
};

document.getElementById('smooth').oninput = e => {

  SMOOTH = +e.target.value;

  document.getElementById('smooth-val')
    .textContent = SMOOTH.toFixed(2);
};

document.getElementById('refrac').oninput = e => {

  REFRAC = +e.target.value;

  document.getElementById('refrac-val')
    .textContent = REFRAC;
};

document.getElementById('msmooth').oninput = e => {

  MSMOOTH = +e.target.value;

  document.getElementById('msmooth-val')
    .textContent = MSMOOTH.toFixed(2);
};

// Fix 5 : seuil de lock configurable
document.getElementById('lock-thresh').oninput = e => {

  LOCK_THRESH = +e.target.value;

  document.getElementById('lock-thresh-val')
    .textContent = LOCK_THRESH.toFixed(2);
};

// ============================================================
// START / STOP
// ============================================================

async function toggle() {

  if (running) {

    stream.getTracks().forEach(t => t.stop());

    ctx.close();

    running = false;

    ledPower.classList.remove('on');

    btnToggle.textContent = '▶ START';

    btnToggle.classList.remove('running');

    resetState();

    return;
  }

  ctx = new AudioContext();

  stream = await navigator.mediaDevices.getUserMedia({

    audio: {

      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false
    }
  });

  src = ctx.createMediaStreamSource(stream);

  analyser = ctx.createAnalyser();

  if (currentMode === 'music') {

    analyser.fftSize = AC_FFT_SIZE;

    acBufLen  = AC_HOP_RATE * AC_BUF_SEC;

    acBuf     = new Float32Array(acBufLen);

    acBufPtr  = 0;

    acBufFull = false;

    acPrevMag = new Float32Array(
      analyser.frequencyBinCount
    );

    _musTimeDomain = new Float32Array(analyser.fftSize);
    _musFreqBins   = new Float32Array(analyser.frequencyBinCount);

    acSmoothedBpm = null;

    acLastUpdate  = 0;

    acFluxSmooth  = 0;

    acLastSampleTime = performance.now();

  } else {

    analyser.fftSize = 2048;

    _tapTimeDomain = new Float32Array(analyser.fftSize);
    _tapFreqBins   = new Uint8Array(analyser.frequencyBinCount);
  }

  src.connect(analyser);

  running = true;

  ledPower.classList.add('on');

  btnToggle.textContent = '■ STOP';

  btnToggle.classList.add('running');

  if (currentMode === 'music') {

    loopMusic();

  } else {

    loop();
  }
}

// ============================================================
// RESET
// ============================================================

function resetState() {

  energyHistory = [];
  onsetHistory  = [];
  beatTimes     = [];

  lastBeat      = 0;
  lastOnsetTime = 0;

  smoothedBpm   = null;

  acSmoothedBpm = null;

  bpmEl.textContent = '--';

  bpmEl.classList.remove('locked');

  setUIState('silence');

  histDots.forEach(d => d.classList.remove('active'));
}

// ============================================================
// TAP MODE LOOP
// ============================================================

function loop() {

  if (!running) return;

  requestAnimationFrame(loop);

  analyser.getFloatTimeDomainData(_tapTimeDomain);

  analyser.getByteFrequencyData(_tapFreqBins);

  const nyquist = ctx.sampleRate / 2;

  const binHz = nyquist / analyser.frequencyBinCount;

  const bassMax = Math.round(200 / binHz);

  let bassSum = 0;

  for (let i = 0; i < bassMax; i++) {
    bassSum += _tapFreqBins[i];
  }

  let bassEnergy = bassSum / bassMax / 255;

  if (energyHistory.length > 0) {

    bassEnergy =
      0.4 * energyHistory.at(-1)
      + 0.6 * bassEnergy;
  }

  energyHistory.push(bassEnergy);

  if (energyHistory.length > 300) {
    energyHistory.shift();
  }

  const db = 20 * Math.log10(bassEnergy + 1e-9);

  const norm = Math.max(
    0,
    Math.min(1, (db + 50) / 50)
  );

  vuFill.style.width = (norm * 100) + '%';

  dbLabel.textContent =
    isFinite(db)
      ? db.toFixed(1) + ' dB'
      : '-∞ dB';

  const diff =
    bassEnergy -
    (energyHistory.at(-2) || bassEnergy);

  onsetHistory.push(diff);

  if (onsetHistory.length > 60) {
    onsetHistory.shift();
  }

  const mean = avg(onsetHistory);

  const sd = stddev(onsetHistory, mean);

  const threshold = mean + SENS * sd;

  const now = performance.now();

  if (diff > threshold && now - lastBeat > REFRAC) {

    triggerBeat(now);
  }

  if (
    now - lastOnsetTime > BPM_TIMEOUT
    && lastOnsetTime > 0
  ) {

    resetState();
  }

  drawWave(_tapTimeDomain);
}
// ============================================================

function loopMusic() {

  if (!running) return;

  requestAnimationFrame(loopMusic);

  analyser.getFloatTimeDomainData(_musTimeDomain);

  analyser.getFloatFrequencyData(_musFreqBins);

  // ==========================================================
  // RMS / VU
  // ==========================================================

  let rms = 0;

  for (let i = 0; i < _musTimeDomain.length; i++) {

    rms += _musTimeDomain[i] * _musTimeDomain[i];
  }

  rms = Math.sqrt(rms / _musTimeDomain.length);

  const db = 20 * Math.log10(rms + 1e-9);

  const norm = Math.max(
    0,
    Math.min(1, (db + 50) / 50)
  );

  vuFill.style.width = (norm * 100) + '%';

  dbLabel.textContent =
    isFinite(db)
      ? db.toFixed(1) + ' dB'
      : '-∞ dB';

  drawWave(_musTimeDomain);

  // ==========================================================
  // SPECTRAL FLUX
  // ==========================================================

  let flux = 0;

  const nBins = analyser.frequencyBinCount;

  const nyquist = ctx.sampleRate / 2;

  const minHz = 40;
  const maxHz = 2500;

  const minBin =
    Math.floor(minHz / nyquist * nBins);

  const maxBin =
    Math.floor(maxHz / nyquist * nBins);

  for (let i = minBin; i < maxBin; i++) {

    const mag =
      Math.max(0, (_musFreqBins[i] + 100) / 100);

    const diff = mag - acPrevMag[i];

    if (diff > 0) {
      flux += diff;
    }

    acPrevMag[i] = mag;
  }

  flux /= (maxBin - minBin);

  // ==========================================================
  // FLUX SMOOTH
  // ==========================================================

  acFluxSmooth =
    0.7 * acFluxSmooth
    + 0.3 * flux;

  flux = acFluxSmooth;

  // ==========================================================
  // TRUE TIME SAMPLING
  // ==========================================================

  const now = performance.now();

  const sampleInterval = 1000 / AC_HOP_RATE;

  if (now - acLastSampleTime >= sampleInterval) {

    acLastSampleTime = now;

    acBuf[acBufPtr] = flux;

    acBufPtr =
      (acBufPtr + 1) % acBufLen;

    if (!acBufFull && acBufPtr === 0) {
      acBufFull = true;
    }

    const usedLen =
      acBufFull ? acBufLen : acBufPtr;

    if (usedLen > AC_HOP_RATE * 2) {

      computeAcorrBPM(usedLen);
    }
  }

  // ==========================================================
  // SILENCE TIMEOUT
  // ==========================================================

  if (
    now - acLastUpdate > 4000
    && acLastUpdate > 0
  ) {

    bpmEl.textContent = '--';

    bpmEl.classList.remove('locked');

    setUIState('silence');

    acSmoothedBpm = null;
  }
}

// ============================================================
// AUTOCORRELATION BPM
// ============================================================

function computeAcorrBPM(len) {

  const sig = new Float32Array(len);

  for (let i = 0; i < len; i++) {

    sig[i] =
      acBuf[
        (acBufPtr - len + i + acBufLen)
        % acBufLen
      ];
  }

  let mean = 0;

  for (let i = 0; i < len; i++) {
    mean += sig[i];
  }

  mean /= len;

  for (let i = 0; i < len; i++) {
    sig[i] -= mean;
  }

  const lagMin =
    Math.ceil(AC_HOP_RATE * 60 / 180);

  const lagMax =
    Math.floor(AC_HOP_RATE * 60 / 60);

  if (lagMax >= len) return;

  let norm0 = 0;

  for (let i = 0; i < len; i++) {
    norm0 += sig[i] * sig[i];
  }

  if (norm0 < 1e-8) return;

  const acVals = [];

  const peaks = [];

  for (let lag = lagMin; lag <= lagMax; lag++) {

    let ac = 0;

    for (let i = 0; i < len - lag; i++) {

      ac += sig[i] * sig[i + lag];
    }

    ac /= norm0;

    // IMPORTANT :
    // pénaliser les petits lags
    ac *= Math.sqrt(lag);

    acVals.push(ac);
  }

  // ==========================================================
  // LOCAL PEAKS
  // ==========================================================

  for (let i = 1; i < acVals.length - 1; i++) {

    const prev = acVals[i - 1];
    const curr = acVals[i];
    const next = acVals[i + 1];

    if (curr > prev && curr > next) {

      const lag = lagMin + i;

      const bpm =
        AC_HOP_RATE * 60 / lag;

      peaks.push({

        lag,
        bpm,
        score: curr
      });
    }
  }

  if (peaks.length === 0) return;

  // ==========================================================
  // SORT PEAKS
  // ==========================================================

  peaks.sort((a, b) => b.score - a.score);

  let best = peaks[0];

  // ==========================================================
  // FAVOR MUSICAL BPM RANGE
  // ==========================================================

  for (const p of peaks) {

    if (p.bpm >= 90 && p.bpm <= 140) {

      if (p.score > best.score * 0.75) {

        best = p;
      }
    }
  }

  const bpm = best.bpm;

  const confidence =
    Math.min(1, best.score);

  acConfidence.textContent =
    (confidence * 100).toFixed(0) + '%';

  // Fix 5 : afficher la valeur brute pour calibration
  acorrRaw.textContent = best.score.toFixed(3);

  // ==========================================================
  // SMOOTHING
  // ==========================================================

  acSmoothedBpm = acSmoothedBpm === null
    ? bpm
    : MSMOOTH * acSmoothedBpm
      + (1 - MSMOOTH) * bpm;

  bpmEl.textContent =
    Math.round(acSmoothedBpm);

  acLastUpdate = performance.now();

  setUIState(
    confidence > LOCK_THRESH
      ? 'locked'
      : 'tracking'
  );

  drawAcorrGraph(acVals, best.lag - lagMin);

  // Fix 6 : beat flash + beat grid en mode Music, cadencé sur le BPM lissé
  if (confidence > LOCK_THRESH) {

    const now = performance.now();

    const beatInterval = 60000 / acSmoothedBpm;

    if (now - lastBeat >= beatInterval) {

      lastBeat = now;

      clearTimeout(flashTimeout);

      beatFlash.style.opacity = '1';

      flashTimeout = setTimeout(() => {
        beatFlash.style.opacity = '0';
      }, 80);

      beatTimes.push(now);

      if (beatTimes.length > 24) {
        beatTimes.shift();
      }

      const active = Math.min(beatTimes.length, HIST_COUNT);

      histDots.forEach((d, i) => {
        d.classList.toggle('active', i < active);
      });
    }
  }
}

// ============================================================
// DRAW ACORR
// ============================================================

function drawAcorrGraph(vals, peakIdx) {

  const dpr = window.devicePixelRatio || 1;

  const w =
    acCanvas.width =
      acCanvas.offsetWidth * dpr;

  const h =
    acCanvas.height =
      acCanvas.offsetHeight * dpr;

  acCtx.clearRect(0, 0, w, h);

  if (vals.length < 2) return;

  const minV = Math.min(...vals);

  const maxV = Math.max(...vals);

  const range = maxV - minV || 1;

  acCtx.beginPath();

  for (let i = 0; i < vals.length; i++) {

    const x =
      (i / (vals.length - 1)) * w;

    const y =
      h -
      ((vals[i] - minV) / range)
      * h * 0.9
      - h * 0.05;

    if (i === 0) {

      acCtx.moveTo(x, y);

    } else {

      acCtx.lineTo(x, y);
    }
  }

  acCtx.strokeStyle = '#00e5ff';

  acCtx.lineWidth = 1.5 * dpr;

  acCtx.stroke();

  const px =
    (peakIdx / (vals.length - 1)) * w;

  const py =
    h -
    ((vals[peakIdx] - minV) / range)
    * h * 0.9
    - h * 0.05;

  acCtx.beginPath();

  acCtx.arc(px, py, 4 * dpr, 0, Math.PI * 2);

  acCtx.fillStyle = '#39ff8a';

  acCtx.fill();
}

// ============================================================
// BEAT
// ============================================================

function triggerBeat(now) {

  lastBeat = lastOnsetTime = now;

  clearTimeout(flashTimeout);

  beatFlash.style.opacity = '1';

  flashTimeout = setTimeout(() => {

    beatFlash.style.opacity = '0';

  }, 80);

  if (beatTimes.length >= 1) {

    const interval =
      now - beatTimes.at(-1);

    const instantBpm =
      60000 / interval;

    if (
      instantBpm > 40
      && instantBpm < 220
    ) {

      bpmEl.textContent =
        Math.round(instantBpm);
    }
  }

  beatTimes.push(now);

  if (beatTimes.length > 24) {
    beatTimes.shift();
  }

  const active =
    Math.min(beatTimes.length, HIST_COUNT);

  histDots.forEach((d, i) => {

    d.classList.toggle('active', i < active);
  });

  computeBPM();
}

// ============================================================
// TAP BPM
// ============================================================

function computeBPM() {

  if (beatTimes.length < 6) return;

  let intervals = [];

  for (let i = 1; i < beatTimes.length; i++) {

    intervals.push(
      beatTimes[i] - beatTimes[i - 1]
    );
  }

  const med = median(intervals);

  const filtered = intervals.filter(v =>

    v > med * 0.7
    &&
    v < med * 1.3
  );

  if (filtered.length < 4) return;

  const avgInt = avg(filtered);

  const bpm = 60000 / avgInt;

  if (bpm < 40 || bpm > 220) return;

  smoothedBpm = smoothedBpm === null

    ? bpm

    : SMOOTH * smoothedBpm
      + (1 - SMOOTH) * bpm;

  bpmEl.textContent =
    Math.round(smoothedBpm);

  const stability =
    stddev(filtered, avgInt)
    / avgInt;

  setUIState(
    stability < 0.08
      ? 'locked'
      : 'tracking'
  );
}

// ============================================================
// UI STATE
// ============================================================

function setUIState(state) {

  stateBadge.className =
    'state-badge ' + state;

  stateText.textContent =
    state.toUpperCase();

  bpmEl.classList.toggle(
    'locked',
    state === 'locked'
  );
}

// ============================================================
// WAVEFORM
// ============================================================

function drawWave(buffer) {

  const dpr = window.devicePixelRatio || 1;

  const w =
    canvas.width =
      canvas.offsetWidth * dpr;

  const h =
    canvas.height =
      canvas.offsetHeight * dpr;

  cctx.clearRect(0, 0, w, h);

  cctx.beginPath();

  for (let i = 0; i < buffer.length; i++) {

    const x =
      (i / buffer.length) * w;

    const y =
      (buffer[i] * 0.5 + 0.5) * h;

    if (i === 0) {

      cctx.moveTo(x, y);

    } else {

      cctx.lineTo(x, y);
    }
  }

  cctx.strokeStyle = '#00e5ff';

  cctx.lineWidth = 1.5 * dpr;

  cctx.stroke();
}

// ============================================================
// MATH
// ============================================================

function avg(a) {

  return a.reduce((s, v) => s + v, 0)
    / a.length;
}

function stddev(a, m) {

  return Math.sqrt(

    a.reduce(
      (s, v) => s + (v - m) ** 2,
      0
    ) / a.length
  );
}

function median(a) {

  const s = [...a].sort((x, y) => x - y);

  const m = Math.floor(s.length / 2);

  return s.length % 2

    ? s[m]

    : (s[m - 1] + s[m]) / 2;
}
