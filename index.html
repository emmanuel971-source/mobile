<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BPM Detector PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #511214;
  --panel:      #1a1c20;
  --panel2:     #1e2024;
  --border:     #2e3138;
  --amber:      #ffb347;
  --amber-dim:  #6b3d00;
  --amber-glow: #ffb34750;
  --green:      #39ff8a;
  --green-dim:  #0a3320;
  --green-glow: #39ff8a40;
  --cyan:       #00e5ff;
  --red:        #ff4655;
  --red-dim:    #3d0008;
  --text-muted: #5a6070;
  --text:       #c8d0dc;
}

html, body {
  background: #0c0d0f;
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 10px 32px;
}

/* ── RACK SHELL ── */
.rack {
  width: 100%;
  max-width: 480px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 8px 40px #00000099, inset 0 1px 0 #ffffff08;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
.rack-header {
  background: linear-gradient(180deg, #23262d, #1a1c22);
  border-bottom: 2px solid #0d0e10;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.screw {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #3a3f4a, #1a1c20);
  border: 1px solid #0d0e10;
  flex-shrink: 0;
}
.brand {
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--text-muted);
}
.rack-title {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--text);
  flex: 1;
}
.led-power {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #0a2218;
  border: 1px solid #061410;
  transition: background 0.3s, box-shadow 0.3s;
  flex-shrink: 0;
}
.led-power.on {
  background: var(--green);
  box-shadow: 0 0 8px var(--green), 0 0 20px var(--green-glow);
}

/* ── BPM DISPLAY ── */
.bpm-section {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 18px 12px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.bpm-left { display: flex; flex-direction: column; }
.bpm-label {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--text-muted);
  margin-bottom: 2px;
}
#bpm {
  font-family: 'Orbitron', monospace;
  font-size: clamp(64px, 22vw, 88px);
  font-weight: 900;
  line-height: 1;
  color: var(--amber);
  text-shadow: 0 0 24px var(--amber-glow);
  letter-spacing: -2px;
  transition: color 0.2s, text-shadow 0.2s;
}
#bpm.locked {
  color: var(--green);
  text-shadow: 0 0 24px var(--green-glow);
}
.bpm-unit {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--text-muted);
  margin-top: 2px;
}
.state-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: 3px;
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  border: 1px solid transparent;
  transition: all 0.2s;
  align-self: flex-end;
  margin-bottom: 4px;
}
.state-badge.silence { background: #1a1c22; color: var(--text-muted); border-color: var(--border); }
.state-badge.tracking { background: #1a1800; color: var(--amber); border-color: #3d3000; }
.state-badge.locked {
  background: var(--green-dim); color: var(--green); border-color: #0e4028;
  box-shadow: 0 0 10px var(--green-glow);
}
.state-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.state-badge.locked .state-dot { animation: blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── BEAT FLASH ── */
.beat-strip { height: 3px; background: var(--border); flex-shrink: 0; }
.beat-flash-bar { height: 100%; width: 100%; background: var(--green); box-shadow: 0 0 10px var(--green); opacity: 0; transition: opacity 0.05s; }

/* ── VU + SCOPE : COLONNE ── */
.meters-col {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}

/* VU Meter horizontal */
.vu-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px 6px;
  border-bottom: 1px solid #1a1e24;
}
.vu-label {
  font-size: 9px; letter-spacing: 3px; color: var(--text-muted);
  flex-shrink: 0; width: 30px;
}
.vu-bar-h {
  flex: 1; height: 10px;
  background: #0d1014;
  border-radius: 3px;
  border: 1px solid #1a1e24;
  overflow: hidden;
  position: relative;
}
.vu-fill-h {
  height: 100%; width: 0%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--cyan) 0%, var(--green) 55%, var(--amber) 80%, var(--red) 100%);
  transition: width 0.04s;
}
#db-label {
  font-size: 9px; color: var(--text-muted);
  flex-shrink: 0; width: 52px; text-align: right;
}

/* Oscilloscope */
.scope-wrap {
  padding: 6px 14px 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.scope-label { font-size: 9px; letter-spacing: 3px; color: var(--text-muted); }
#wave {
  width: 100%; height: 70px; display: block;
  border-radius: 3px;
  background: #080a0c;
  border: 1px solid #1a1e24;
}

/* ── BEAT GRID ── */
.history-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 14px;
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  flex-wrap: nowrap;
}
.history-label {
  font-size: 9px; letter-spacing: 2px; color: var(--text-muted);
  margin-left: auto; flex-shrink: 0;
}
.history-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.2s, box-shadow 0.2s;
}
.history-dot.active {
  background: var(--amber);
  box-shadow: 0 0 5px var(--amber-glow);
}

/* ── CONTROLS : colonne propre ── */
.controls-panel {
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.ctrl-group { display: flex; flex-direction: column; gap: 6px; }
.ctrl-label {
  font-size: 9px; letter-spacing: 3px; color: var(--text-muted);
  display: flex; justify-content: space-between;
}
.ctrl-val { color: var(--amber); }

input[type=range] {
  -webkit-appearance: none;
  width: 100%; height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;   /* plus grand pour doigt */
  border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 6px var(--amber-glow);
  border: 2px solid var(--bg);
  cursor: pointer;
}

/* ── MODE SELECTOR ── */
.mode-panel {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.mode-label {
  font-size: 9px; letter-spacing: 3px; color: var(--text-muted);
}
.mode-btns {
  display: flex;
  gap: 8px;
}
.mode-btn {
  flex: 1;
  padding: 9px 8px;
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.mode-btn:active { opacity: 0.7; }
.mode-btn.active-tap {
  background: #1a1800;
  color: var(--amber);
  border-color: #3d3000;
  box-shadow: 0 0 10px #ffb34730;
}
.mode-btn.active-music {
  background: #001a2e;
  color: var(--cyan);
  border-color: #003d5c;
  box-shadow: 0 0 10px #00e5ff30;
}

/* ── MUSIC MODE : panneau d'état autocorrélation ── */
.acorr-panel {
  display: none;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px 10px;
  flex-direction: column;
  gap: 5px;
}
.acorr-panel.visible { display: flex; }
.acorr-label { font-size: 9px; letter-spacing: 3px; color: var(--text-muted); }
#acorr-canvas {
  width: 100%; height: 48px; display: block;
  border-radius: 3px;
  background: #080a0c;
  border: 1px solid #1a1e24;
}
.acorr-info {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: var(--text-muted);
}
#acorr-confidence { color: var(--cyan); }

/* contrôles spécifiques MUSIC (masqués en mode TAP) */
.ctrl-music-only { display: none; }
.ctrl-music-only.visible { display: flex; }

/* ── BOUTONS ── */
.btn-panel {
  padding: 12px 14px;
  display: flex;
  gap: 10px;
  align-items: center;
  background: var(--panel);
}
#btn-toggle {
  flex: 1; padding: 14px 16px;
  font-family: 'Orbitron', monospace;
  font-size: 12px; font-weight: 700; letter-spacing: 3px;
  border: none; border-radius: 5px; cursor: pointer;
  background: var(--green-dim); color: var(--green);
  border: 1px solid #1a4030;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
#btn-toggle:active { opacity: 0.8; }
#btn-toggle.running { background: var(--red-dim); color: var(--red); border-color: #4d0010; }
#btn-reset {
  padding: 14px 14px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; letter-spacing: 2px;
  border: 1px solid var(--border); border-radius: 5px;
  cursor: pointer; background: transparent; color: var(--text-muted);
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
#btn-reset:active { color: var(--text); }

/* ── FOOTER ── */
.rack-footer {
  background: linear-gradient(180deg, #16181e, #111214);
  border-top: 1px solid var(--border);
  padding: 7px 14px;
  display: flex; justify-content: space-between;
}
.rack-footer span { font-size: 9px; letter-spacing: 2px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="rack">

  <!-- HEADER -->
  <div class="rack-header">
    <div class="screw"></div>
    <span class="brand">STUDIO</span>
    <span class="rack-title">MINI BPM DETECTOR</span>
    <div class="led-power" id="led-power"></div>
    <div class="screw"></div>
  </div>

  <!-- BPM DISPLAY -->
  <div class="bpm-section">
    <div class="bpm-left">
      <div class="bpm-label">TEMPO</div>
      <div id="bpm">--</div>
      <div class="bpm-unit">BPM</div>
    </div>
    <div class="state-badge silence" id="state-badge">
      <div class="state-dot"></div>
      <span id="state-text">SILENCE</span>
    </div>
  </div>

  <!-- BEAT FLASH STRIP -->
  <div class="beat-strip"><div class="beat-flash-bar" id="beat-flash"></div></div>

  <!-- VU + SCOPE en colonne -->
  <div class="meters-col">
    <div class="vu-wrap">
      <div class="vu-label">BASS</div>
      <div class="vu-bar-h"><div class="vu-fill-h" id="vu-fill"></div></div>
      <div id="db-label">-∞ dB</div>
    </div>
    <div class="scope-wrap">
      <div class="scope-label">WAVEFORM</div>
      <canvas id="wave"></canvas>
    </div>
  </div>

  <!-- BEAT GRID -->
  <div class="history-row" id="history-row">
    <div class="history-label">BEAT GRID</div>
  </div>

  <!-- MODE SELECTOR -->
  <div class="mode-panel">
    <div class="mode-label">MODE</div>
    <div class="mode-btns">
      <button class="mode-btn active-tap" id="btn-mode-tap"   onclick="setMode('tap')">🥁 TAP / CLAP</button>
      <button class="mode-btn"            id="btn-mode-music" onclick="setMode('music')">🎵 MUSIQUE</button>
    </div>
  </div>

  <!-- AUTOCORRELATION VISUALIZER (music mode only) -->
  <div class="acorr-panel" id="acorr-panel">
    <div class="acorr-label">AUTOCORRÉLATION · FLUX SPECTRAL</div>
    <canvas id="acorr-canvas"></canvas>
    <div class="acorr-info">
      <span>ANALYSE EN COURS…</span>
      <span>CONFIANCE : <span id="acorr-confidence">--</span></span>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-panel">
    <div class="ctrl-group" id="ctrl-sens">
      <div class="ctrl-label">SENSIBILITÉ <span class="ctrl-val" id="sens-val">1.8</span></div>
      <input type="range" id="sens" min="1.2" max="3" step="0.1" value="1.8">
    </div>
    <div class="ctrl-group" id="ctrl-smooth">
      <div class="ctrl-label">LISSAGE BPM <span class="ctrl-val" id="smooth-val">0.75</span></div>
      <input type="range" id="smooth" min="0.5" max="0.95" step="0.01" value="0.75">
    </div>
    <div class="ctrl-group" id="ctrl-refrac">
      <div class="ctrl-label">REFRACTORY (ms) <span class="ctrl-val" id="refrac-val">180</span></div>
      <input type="range" id="refrac" min="100" max="400" step="10" value="180">
    </div>
    <!-- Contrôle MUSIC uniquement -->
    <div class="ctrl-group ctrl-music-only" id="ctrl-acorr-smooth">
      <div class="ctrl-label">LISSAGE BPM MUSIQUE <span class="ctrl-val" id="msmooth-val">0.85</span></div>
      <input type="range" id="msmooth" min="0.5" max="0.97" step="0.01" value="0.85">
    </div>
  </div>

  <!-- BOUTONS -->
  <div class="btn-panel">
    <button id="btn-toggle" onclick="toggle()">▶ START</button>
    <button id="btn-reset" onclick="resetState()">RESET</button>
  </div>

  <!-- FOOTER -->
  <div class="rack-footer">
    <span id="footer-mode-label">BASS ONSET DETECTION</span>
    <span>v3.0</span>
  </div>

</div>

<script>
// ============================================================
// CONFIGURATION & VARIABLES
// ============================================================
let ctx, analyser, source;
let running = false;

// Logique de détection
let energyHistory = new Float32Array(50); // Historique court pour moyenne mobile
let historyPtr = 0;
let lastOnsetTime = 0;
let intervals = []; // Stockage des délais entre les beats

// Paramètres (liés à tes sliders)
let SENS = 1.8;      // Sensibilité (seuil)
let REFRAC = 200;    // Temps mort en ms (évite les doubles déclenchements)
let SMOOTH = 0.8;    // Lissage de l'affichage

// ============================================================
// DÉMARRAGE AUDIO
// ============================================================
async function toggle() {
  if (!running) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    source = ctx.createMediaStreamSource(stream);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 1024;
    source.connect(analyser);
    
    running = true;
    document.getElementById('btn-toggle').innerText = "⏹ STOP";
    document.getElementById('led-power').classList.add('on');
    loop();
  } else {
    ctx.close();
    running = false;
    document.getElementById('btn-toggle').innerText = "▶ START";
    document.getElementById('led-power').classList.remove('on');
  }
}

// ============================================================
// BOUCLE DE TRAITEMENT (60 FPS)
// ============================================================
function loop() {
  if (!running) return;
  requestAnimationFrame(loop);

  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);

  // 1. On se focalise sur les Basses (0 à 150Hz environ)
  let lowEnergy = 0;
  for(let i=0; i<10; i++) lowEnergy += data[i];
  lowEnergy /= 10;

  // 2. Calcul du seuil adaptatif (moyenne des 50 dernières frames)
  let avgEnergy = 0;
  for(let n of energyHistory) avgEnergy += n;
  avgEnergy /= energyHistory.length;
  energyHistory[historyPtr] = lowEnergy;
  historyPtr = (historyPtr + 1) % energyHistory.length;

  // 3. DÉTECTION DU PIC (Onset)
  const now = performance.now();
  if (lowEnergy > avgEnergy * SENS && (now - lastOnsetTime) > REFRAC) {
    triggerBeat(now);
  }

  // 4. MISE À JOUR UI (VU Meter & Scope)
  updateUI(lowEnergy, data);
}

// ============================================================
// CALCUL DU BPM (La Magie de la Médiane)
// ============================================================
function triggerBeat(now) {
  if (lastOnsetTime > 0) {
    const delta = now - lastOnsetTime;
    
    // On ne garde que les intervalles réalistes (30 à 250 BPM)
    if (delta > 240 && delta < 2000) {
      intervals.push(delta);
      if (intervals.length > 8) intervals.shift(); // On garde les 8 derniers coups

      // --- FILTRE MÉDIAN ---
      const sorted = [...intervals].sort((a, b) => a - b);
      const medianDelta = sorted[Math.floor(sorted.length / 2)];
      
      const rawBpm = 60000 / medianDelta;
      displayBpm(rawBpm);
    }
  }
  
  lastOnsetTime = now;
  visualFlash(); // Ta fonction de flash visuel
}

function displayBpm(val) {
  const el = document.getElementById('bpm');
  // Lissage léger pour ne pas que le chiffre change trop vite
  let currentDisplay = parseFloat(el.innerText) || val;
  let finalBpm = currentDisplay * SMOOTH + val * (1 - SMOOTH);
  
  el.innerText = Math.round(finalBpm);
}

// ============================================================
// VISUELS
// ============================================================
function updateUI(energy, data) {
  // Update du VU Meter
  const percent = Math.min(100, (energy / 255) * 100);
  document.getElementById('vu-fill').style.width = percent + '%';
  
  // Ici tu peux remettre ton code de dessin de l'oscilloscope (wave)
}

function visualFlash() {
  const flash = document.getElementById('beat-flash');
  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 100);
}

</script>

</body>
</html>
