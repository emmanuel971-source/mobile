<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BPM Detector PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #00403a;
  --panel:      #1a1c20;
  --panel2:     #1e2024;
  --border:     #2e3138;
  --amber:      #ffb347;
  --amber-dim:  #6b3d00;
  --amber-glow: #ffb34750;
  --green:      #39ff8a;
  --green-dim:  #0a3320;
  --green-glow: #39ff8a40;
  --cyan:       #00e5ff;
  --red:        #ff4655;
  --red-dim:    #3d0008;
  --text-muted: #5a6070;
  --text:       #c8d0dc;
}

html, body {
  background: #0c0d0f;
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 10px 32px;
}

/* ── RACK SHELL ── */
.rack {
  width: 100%;
  max-width: 480px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 8px 40px #00000099, inset 0 1px 0 #ffffff08;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
.rack-header {
  background: linear-gradient(180deg, #23262d, #1a1c22);
  border-bottom: 2px solid #0d0e10;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.screw {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #3a3f4a, #1a1c20);
  border: 1px solid #0d0e10;
  flex-shrink: 0;
}
.brand {
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--text-muted);
}
.rack-title {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--text);
  flex: 1;
}
.led-power {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #0a2218;
  border: 1px solid #061410;
  transition: background 0.3s, box-shadow 0.3s;
  flex-shrink: 0;
}
.led-power.on {
  background: var(--green);
  box-shadow: 0 0 8px var(--green), 0 0 20px var(--green-glow);
}

/* ── BPM DISPLAY ── */
.bpm-section {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 18px 12px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.bpm-left { display: flex; flex-direction: column; }
.bpm-label {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--text-muted);
  margin-bottom: 2px;
}
#bpm {
  font-family: 'Orbitron', monospace;
  font-size: clamp(64px, 22vw, 88px);
  font-weight: 900;
  line-height: 1;
  color: var(--amber);
  text-shadow: 0 0 24px var(--amber-glow);
  letter-spacing: -2px;
  transition: color 0.2s, text-shadow 0.2s;
}
#bpm.locked {
  color: var(--green);
  text-shadow: 0 0 24px var(--green-glow);
}
.bpm-unit {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--text-muted);
  margin-top: 2px;
}
.state-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: 3px;
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  border: 1px solid transparent;
  transition: all 0.2s;
  align-self: flex-end;
  margin-bottom: 4px;
}
.state-badge.silence { background: #1a1c22; color: var(--text-muted); border-color: var(--border); }
.state-badge.tracking { background: #1a1800; color: var(--amber); border-color: #3d3000; }
.state-badge.locked {
  background: var(--green-dim); color: var(--green); border-color: #0e4028;
  box-shadow: 0 0 10px var(--green-glow);
}
.state-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.state-badge.locked .state-dot { animation: blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── BEAT FLASH ── */
.beat-strip { height: 3px; background: var(--border); flex-shrink: 0; }
.beat-flash-bar { height: 100%; width: 100%; background: var(--green); box-shadow: 0 0 10px var(--green); opacity: 0; transition: opacity 0.05s; }

/* ── VU + SCOPE : COLONNE ── */
.meters-col {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}

/* VU Meter horizontal */
.vu-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px 6px;
  border-bottom: 1px solid #1a1e24;
}
.vu-label {
  font-size: 9px; letter-spacing: 3px; color: var(--text-muted);
  flex-shrink: 0; width: 30px;
}
.vu-bar-h {
  flex: 1; height: 10px;
  background: #0d1014;
  border-radius: 3px;
  border: 1px solid #1a1e24;
  overflow: hidden;
  position: relative;
}
.vu-fill-h {
  height: 100%; width: 0%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--cyan) 0%, var(--green) 55%, var(--amber) 80%, var(--red) 100%);
  transition: width 0.04s;
}
#db-label {
  font-size: 9px; color: var(--text-muted);
  flex-shrink: 0; width: 52px; text-align: right;
}

/* Oscilloscope */
.scope-wrap {
  padding: 6px 14px 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.scope-label { font-size: 9px; letter-spacing: 3px; color: var(--text-muted); }
#wave {
  width: 100%; height: 70px; display: block;
  border-radius: 3px;
  background: #080a0c;
  border: 1px solid #1a1e24;
}

/* ── BEAT GRID ── */
.history-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 14px;
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  flex-wrap: nowrap;
}
.history-label {
  font-size: 9px; letter-spacing: 2px; color: var(--text-muted);
  margin-left: auto; flex-shrink: 0;
}
.history-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.2s, box-shadow 0.2s;
}
.history-dot.active {
  background: var(--amber);
  box-shadow: 0 0 5px var(--amber-glow);
}

/* ── CONTROLS : colonne propre ── */
.controls-panel {
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.ctrl-group { display: flex; flex-direction: column; gap: 6px; }
.ctrl-label {
  font-size: 9px; letter-spacing: 3px; color: var(--text-muted);
  display: flex; justify-content: space-between;
}
.ctrl-val { color: var(--amber); }

input[type=range] {
  -webkit-appearance: none;
  width: 100%; height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 6px var(--amber-glow);
  border: 2px solid var(--bg);
  cursor: pointer;
}

/* ── MODE SELECTOR ── */
.mode-panel {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.mode-label {
  font-size: 9px; letter-spacing: 3px; color: var(--text-muted);
}
.mode-btns {
  display: flex;
  gap: 8px;
}
.mode-btn {
  flex: 1;
  padding: 9px 8px;
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.mode-btn:active { opacity: 0.7; }
.mode-btn.active-tap {
  background: #1a1800;
  color: var(--amber);
  border-color: #3d3000;
  box-shadow: 0 0 10px #ffb34730;
}
.mode-btn.active-music {
  background: #001a2e;
  color: var(--cyan);
  border-color: #003d5c;
  box-shadow: 0 0 10px #00e5ff30;
}
/* FIX 8 : feedback visuel quand setMode bloqué pendant running */
.mode-btn.blocked {
  animation: shake 0.3s ease;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-4px); }
  75%      { transform: translateX(4px); }
}

/* ── MUSIC MODE : panneau d'état autocorrélation ── */
.acorr-panel {
  display: none;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px 10px;
  flex-direction: column;
  gap: 5px;
}
.acorr-panel.visible { display: flex; }
.acorr-label { font-size: 9px; letter-spacing: 3px; color: var(--text-muted); }
#acorr-canvas {
  width: 100%; height: 48px; display: block;
  border-radius: 3px;
  background: #080a0c;
  border: 1px solid #1a1e24;
}
.acorr-info {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: var(--text-muted);
}
#acorr-confidence { color: var(--cyan); }

/* contrôles spécifiques MUSIC (masqués en mode TAP) */
.ctrl-music-only { display: none; }
.ctrl-music-only.visible { display: flex; }

/* contrôles spécifiques TAP (masqués en mode MUSIC) */
.ctrl-tap-only { display: flex; }
.ctrl-tap-only.hidden { display: none; }

/* ── BOUTONS ── */
.btn-panel {
  padding: 12px 14px;
  display: flex;
  gap: 10px;
  align-items: center;
  background: var(--panel);
}
#btn-toggle {
  flex: 1; padding: 14px 16px;
  font-family: 'Orbitron', monospace;
  font-size: 12px; font-weight: 700; letter-spacing: 3px;
  border: none; border-radius: 5px; cursor: pointer;
  background: var(--green-dim); color: var(--green);
  border: 1px solid #1a4030;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
#btn-toggle:active { opacity: 0.8; }
#btn-toggle.running { background: var(--red-dim); color: var(--red); border-color: #4d0010; }
#btn-reset {
  padding: 14px 14px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; letter-spacing: 2px;
  border: 1px solid var(--border); border-radius: 5px;
  cursor: pointer; background: transparent; color: var(--text-muted);
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
#btn-reset:active { color: var(--text); }

/* ── FOOTER ── */
.rack-footer {
  background: linear-gradient(180deg, #16181e, #111214);
  border-top: 1px solid var(--border);
  padding: 7px 14px;
  display: flex; justify-content: space-between;
}
.rack-footer span { font-size: 9px; letter-spacing: 2px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="rack">

  <!-- HEADER -->
  <div class="rack-header">
    <div class="screw"></div>
    <span class="brand">STUDIO</span>
    <span class="rack-title">MULTIBAND AUTOCORRELATION</span>
    <div class="led-power" id="led-power"></div>
    <div class="screw"></div>
  </div>

  <!-- BPM DISPLAY -->
  <div class="bpm-section">
    <div class="bpm-left">
      <div class="bpm-label">TEMPO</div>
      <div id="bpm">--</div>
      <div class="bpm-unit">BPM</div>
    </div>
    <div class="state-badge silence" id="state-badge">
      <div class="state-dot"></div>
      <span id="state-text">SILENCE</span>
    </div>
  </div>

  <!-- BEAT FLASH STRIP -->
  <div class="beat-strip"><div class="beat-flash-bar" id="beat-flash"></div></div>

  <!-- VU + SCOPE en colonne -->
  <div class="meters-col">
    <div class="vu-wrap">
      <div class="vu-label" id="vu-label">BASS</div>
      <div class="vu-bar-h"><div class="vu-fill-h" id="vu-fill"></div></div>
      <div id="db-label">-∞ dB</div>
    </div>
    <div class="scope-wrap">
      <div class="scope-label">WAVEFORM</div>
      <canvas id="wave"></canvas>
    </div>
  </div>

  <!-- BEAT GRID -->
  <div class="history-row" id="history-row">
    <div class="history-label">BEAT GRID</div>
  </div>

  <!-- MODE SELECTOR -->
  <div class="mode-panel">
    <div class="mode-label">MODE</div>
    <div class="mode-btns">
      <button class="mode-btn active-tap" id="btn-mode-tap"   onclick="setMode('tap')">🥁 TAP / CLAP</button>
      <button class="mode-btn"            id="btn-mode-music" onclick="setMode('music')">🎵 MUSIQUE</button>
    </div>
  </div>

  <!-- AUTOCORRELATION VISUALIZER (music mode only) -->
  <div class="acorr-panel" id="acorr-panel">
    <div class="acorr-label">AUTOCORRÉLATION · FLUX SPECTRAL</div>
    <canvas id="acorr-canvas"></canvas>
    <div class="acorr-info">
      <span>ANALYSE EN COURS…</span>
      <span>CONFIANCE : <span id="acorr-confidence">--</span></span>
    </div>
    <div class="ctrl-group" style="margin-top:6px">
      <div class="ctrl-label">SEUIL LOCK <span class="ctrl-val" id="lock-thresh-val">0.18</span> <span style="color:var(--text-muted);font-size:8px">(brut : <span id="acorr-raw">--</span>)</span></div>
      <input type="range" id="lock-thresh" min="0.05" max="0.50" step="0.01" value="0.18">
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-panel">
    <div class="ctrl-group ctrl-tap-only" id="ctrl-sens">
      <div class="ctrl-label">SENSIBILITÉ <span class="ctrl-val" id="sens-val">1.8</span></div>
      <input type="range" id="sens" min="1.2" max="3" step="0.1" value="1.8">
    </div>
    <div class="ctrl-group ctrl-tap-only" id="ctrl-smooth">
      <div class="ctrl-label">LISSAGE BPM <span class="ctrl-val" id="smooth-val">0.75</span></div>
      <input type="range" id="smooth" min="0.5" max="0.95" step="0.01" value="0.75">
    </div>
    <div class="ctrl-group ctrl-tap-only" id="ctrl-refrac">
      <div class="ctrl-label">REFRACTORY (ms) <span class="ctrl-val" id="refrac-val">180</span></div>
      <input type="range" id="refrac" min="100" max="400" step="10" value="180">
    </div>
    <!-- Contrôle MUSIC uniquement -->
    <div class="ctrl-group ctrl-music-only" id="ctrl-acorr-smooth">
      <div class="ctrl-label">LISSAGE BPM MUSIQUE <span class="ctrl-val" id="msmooth-val">0.85</span></div>
      <input type="range" id="msmooth" min="0.5" max="0.97" step="0.01" value="0.85">
    </div>
  </div>

  <!-- BOUTONS -->
  <div class="btn-panel">
    <button id="btn-toggle" onclick="toggle()">▶ START</button>
    <button id="btn-reset" onclick="resetState()">RESET</button>
  </div>

  <!-- FOOTER -->
  <div class="rack-footer">
    <span id="footer-mode-label">BASS ONSET DETECTION</span>
    <span>v3.1</span>
  </div>

</div>

<script>
// ============================================================
// AUDIO
// ============================================================
let ctx, analyser, src, stream;
let running = false;

// ============================================================
// MODE
// ============================================================
let currentMode = 'tap';

function setMode(m) {
  // FIX 8 : feedback visuel si tentative de changement pendant running
  if (running) {
    const btn = document.getElementById(m === 'tap' ? 'btn-mode-tap' : 'btn-mode-music');
    btn.classList.add('blocked');
    setTimeout(() => btn.classList.remove('blocked'), 350);
    return;
  }
  currentMode = m;
  const isTap = m === 'tap';

  document.getElementById('btn-mode-tap').className = 'mode-btn' + (isTap ? ' active-tap' : '');
  document.getElementById('btn-mode-music').className = 'mode-btn' + (!isTap ? ' active-music' : '');
  document.getElementById('acorr-panel').classList.toggle('visible', !isTap);
  document.querySelectorAll('.ctrl-tap-only').forEach(el => el.classList.toggle('hidden', !isTap));
  document.querySelectorAll('.ctrl-music-only').forEach(el => el.classList.toggle('visible', !isTap));

  // FIX (VU label) : adapter le label selon le mode
  document.getElementById('vu-label').textContent = isTap ? 'BASS' : 'FLUX';

  document.getElementById('footer-mode-label').textContent =
    isTap ? 'BASS ONSET DETECTION' : 'SPECTRAL FLUX MULTI-BANDES · 100HZ';

  resetState();
}

// ============================================================
// STATE & PARAMS
// ============================================================
let energyHistory = [], onsetHistory = [], beatTimes = [];
let lastBeat = 0, lastOnsetTime = 0, smoothedBpm = null, flashTimeout = null;

let SENS = 1.8, SMOOTH = 0.75, REFRAC = 180;
const HIST_COUNT = 16;

// MUSIC MODE
let MSMOOTH = 0.85, LOCK_THRESH = 0.18;
const AC_FFT_SIZE = 4096;
const AC_HOP_RATE = 100; // 10ms
const AC_BUF_SEC  = 8;
const FLUX_GATE   = 0.02;

const WEIGHT_BASS = 1.5, WEIGHT_MID = 0.5, WEIGHT_HIGH = 1.2;

let acBufLen = 0, acBuf = null, acBufPtr = 0, acBufFull = false;
let acPrevMag = null, acSmoothedBpm = null, acLastUpdate = 0;
let acFluxSmooth = 0, acLastSampleTime = 0;

let _tapTimeDomain = null, _tapFreqBins = null;
let _musTimeDomain = null, _musFreqBins = null;

// UI REFS
const bpmEl     = document.getElementById('bpm');
const dbLabel   = document.getElementById('db-label');
const vuFill    = document.getElementById('vu-fill');
const stateBadge= document.getElementById('state-badge');
const stateText = document.getElementById('state-text');
const beatFlash = document.getElementById('beat-flash');
const ledPower  = document.getElementById('led-power');
const btnToggle = document.getElementById('btn-toggle');
const histRow   = document.getElementById('history-row');
const canvas    = document.getElementById('wave');
const cctx      = canvas.getContext('2d');
const acCanvas  = document.getElementById('acorr-canvas');
const acCtx     = acCanvas.getContext('2d');
const acConfidence = document.getElementById('acorr-confidence');
const acorrRaw  = document.getElementById('acorr-raw');

// ── BEAT GRID : création des dots au démarrage ──────────────
const histDots = [];
(function initBeatGrid() {
  for (let i = 0; i < HIST_COUNT; i++) {
    const d = document.createElement('div');
    d.className = 'history-dot';
    histRow.insertBefore(d, histRow.querySelector('.history-label'));
    histDots.push(d);
  }
})();

let beatGridPtr = 0; // pointeur circulaire pour la grille

// ============================================================
// CONTROLS
// ============================================================
document.getElementById('sens').oninput       = e => { SENS        = +e.target.value; document.getElementById('sens-val').textContent        = SENS.toFixed(1); };
document.getElementById('smooth').oninput     = e => { SMOOTH      = +e.target.value; document.getElementById('smooth-val').textContent      = SMOOTH.toFixed(2); };
document.getElementById('msmooth').oninput    = e => { MSMOOTH     = +e.target.value; document.getElementById('msmooth-val').textContent     = MSMOOTH.toFixed(2); };
document.getElementById('lock-thresh').oninput= e => { LOCK_THRESH = +e.target.value; document.getElementById('lock-thresh-val').textContent = LOCK_THRESH.toFixed(2); };
// FIX 4 : handler manquant pour le slider refrac
document.getElementById('refrac').oninput     = e => { REFRAC      = +e.target.value; document.getElementById('refrac-val').textContent      = REFRAC.toFixed(0); };

// ============================================================
// START / STOP
// ============================================================
async function toggle() {
  if (running) {
    stream.getTracks().forEach(t => t.stop());
    ctx.close();
    running = false;
    ledPower.classList.remove('on');
    btnToggle.textContent = '▶ START';
    btnToggle.classList.remove('running');
    resetState();
    return;
  }

  // FIX 7 : try/catch sur getUserMedia avec feedback utilisateur
  try {
    ctx = new AudioContext();
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
    });
  } catch (err) {
    const msg = err.name === 'NotAllowedError'
      ? 'ACCÈS MICRO REFUSÉ'
      : 'ERREUR MICRO : ' + err.message;
    bpmEl.textContent = '!';
    dbLabel.textContent = msg.substring(0, 12);
    setUIState('silence');
    console.error('[BPM] getUserMedia error:', err);
    return;
  }

  src      = ctx.createMediaStreamSource(stream);
  analyser = ctx.createAnalyser();

  if (currentMode === 'music') {
    analyser.fftSize = AC_FFT_SIZE;
    acBufLen = Math.floor(AC_HOP_RATE * AC_BUF_SEC);
    acBuf    = new Float32Array(acBufLen);
    acBufPtr = 0; acBufFull = false;
    acPrevMag        = new Float32Array(analyser.frequencyBinCount);
    _musTimeDomain   = new Float32Array(analyser.fftSize);
    _musFreqBins     = new Float32Array(analyser.frequencyBinCount);
    acSmoothedBpm    = null; acLastUpdate = 0; acFluxSmooth = 0;
    acLastSampleTime = performance.now();
  } else {
    analyser.fftSize   = 2048;
    _tapTimeDomain     = new Float32Array(analyser.fftSize);
    _tapFreqBins       = new Uint8Array(analyser.frequencyBinCount);
  }

  src.connect(analyser);
  running = true;
  ledPower.classList.add('on');
  btnToggle.textContent = '■ STOP';
  btnToggle.classList.add('running');
  currentMode === 'music' ? loopMusic() : loop();
}

function resetState() {
  energyHistory = []; onsetHistory = []; beatTimes = [];
  lastBeat = 0; lastOnsetTime = 0; smoothedBpm = null; acSmoothedBpm = null;
  bpmEl.textContent = '--';
  bpmEl.classList.remove('locked');
  // Reset VU meter
  vuFill.style.width = '0%';
  dbLabel.textContent = '-∞ dB';
  // Reset beat grid
  beatGridPtr = 0;
  histDots.forEach(d => d.classList.remove('active'));
  setUIState('silence');
}

// ============================================================
// LOOPS
// ============================================================
function loop() {
  if (!running) return;
  requestAnimationFrame(loop);
  analyser.getFloatTimeDomainData(_tapTimeDomain);
  analyser.getByteFrequencyData(_tapFreqBins);

  const binHz  = (ctx.sampleRate / 2) / analyser.frequencyBinCount;
  const bassMax = Math.round(200 / binHz);
  let bassSum = 0;
  for (let i = 0; i < bassMax; i++) bassSum += _tapFreqBins[i];
  let bassEnergy = bassSum / bassMax / 255;

  energyHistory.push(bassEnergy);
  if (energyHistory.length > 300) energyHistory.shift();

  const diff = bassEnergy - (energyHistory.at(-2) || bassEnergy);
  onsetHistory.push(diff);
  if (onsetHistory.length > 60) onsetHistory.shift();

  // FIX (VU) : mise à jour VU meter en mode TAP (énergie basse)
  updateVU(bassEnergy);

  const threshold = avg(onsetHistory) + SENS * stddev(onsetHistory, avg(onsetHistory));
  const now = performance.now();
  if (diff > threshold && now - lastBeat > REFRAC) triggerBeat(now);
  drawWave(_tapTimeDomain);
}

function loopMusic() {
  if (!running) return;
  requestAnimationFrame(loopMusic);

  analyser.getFloatTimeDomainData(_musTimeDomain);
  analyser.getFloatFrequencyData(_musFreqBins);

  // SPECTRAL FLUX MULTI-BANDES
  const nBins   = analyser.frequencyBinCount;
  const nyquist = ctx.sampleRate / 2;
  let fluxB = 0, fluxM = 0, fluxH = 0, cB = 0, cM = 0, cH = 0;

  for (let i = 0; i < nBins; i++) {
    const hz  = (i * nyquist) / nBins;
    const mag = Math.max(0, (_musFreqBins[i] + 100) / 100);
    const d   = mag - acPrevMag[i];
    acPrevMag[i] = mag;
    if (d > 0) {
      if      (hz <= 150)  { fluxB += d; cB++; }
      else if (hz <= 1000) { fluxM += d; cM++; }
      else if (hz <= 4000) { fluxH += d; cH++; }
    }
  }

  const totalFlux = ((fluxB/(cB||1))*WEIGHT_BASS) + ((fluxM/(cM||1))*WEIGHT_MID) + ((fluxH/(cH||1))*WEIGHT_HIGH);
  const finalFlux = totalFlux > FLUX_GATE ? totalFlux : 0;
  acFluxSmooth    = 0.5 * acFluxSmooth + 0.5 * finalFlux;

  // FIX (VU) : mise à jour VU meter en mode MUSIC (flux normalisé)
  updateVU(Math.min(acFluxSmooth / 2, 1));

  const now = performance.now();
  if (now - acLastSampleTime >= (1000 / AC_HOP_RATE)) {
    acLastSampleTime    = now;
    acBuf[acBufPtr]     = acFluxSmooth;
    acBufPtr            = (acBufPtr + 1) % acBufLen;
    if (!acBufFull && acBufPtr === 0) acBufFull = true;
    const available     = acBufFull ? acBufLen : acBufPtr;
    // FIX 5 : vérification que len > lagMax avant de lancer l'autocorrélation
    const lagMax        = Math.floor(AC_HOP_RATE * 60 / 60); // = 100
    if (available > lagMax + 10) computeAcorrBPM(available);
  }
  drawWave(_musTimeDomain);
}

// ============================================================
// CORE MATH
// ============================================================
function computeAcorrBPM(len) {
  const sig = new Float32Array(len);
  let mean  = 0;
  for (let i = 0; i < len; i++) {
    sig[i] = acBuf[(acBufPtr - len + i + acBufLen) % acBufLen];
    mean  += sig[i];
  }
  mean /= len;
  for (let i = 0; i < len; i++) sig[i] -= mean;

  const lagMin = Math.ceil(AC_HOP_RATE * 60 / 180);
  const lagMax = Math.floor(AC_HOP_RATE * 60 / 60);
  let norm0 = 0;
  for (let i = 0; i < len; i++) norm0 += sig[i] * sig[i];
  if (norm0 < 1e-8) return;

  const acVals = [];
  const peaks  = [];
  for (let lag = lagMin; lag <= lagMax; lag++) {
    let ac = 0;
    for (let i = 0; i < len - lag; i++) ac += sig[i] * sig[i + lag];
    ac /= norm0;
    ac *= (len / (len - lag));
    acVals.push(ac);
  }

  for (let i = 1; i < acVals.length - 1; i++) {
    if (acVals[i] > acVals[i-1] && acVals[i] > acVals[i+1]) {
      peaks.push({ bpm: (AC_HOP_RATE * 60) / (lagMin + i), score: acVals[i], lagIdx: i });
    }
  }

  if (peaks.length === 0) return;
  peaks.sort((a, b) => b.score - a.score);
  let best = peaks[0];
  for (const p of peaks) { if (p.bpm >= 85 && p.bpm <= 155 && p.score > best.score * 0.75) { best = p; break; } }

  const confidence = Math.max(0, best.score);
  acConfidence.textContent = (confidence * 100).toFixed(0) + '%';
  acorrRaw.textContent     = best.score.toFixed(3);

  const ds      = confidence > LOCK_THRESH ? MSMOOTH : 0.95;
  acSmoothedBpm = acSmoothedBpm === null ? best.bpm : (ds * acSmoothedBpm + (1 - ds) * best.bpm);
  bpmEl.textContent = Math.round(acSmoothedBpm);
  acLastUpdate  = performance.now();
  setUIState(confidence > LOCK_THRESH ? 'locked' : 'tracking');
  drawAcorrGraph(acVals, best.lagIdx);
}

// ============================================================
// UI & HELPERS
// ============================================================
function setUIState(s) {
  stateBadge.className  = 'state-badge ' + s;
  stateText.textContent = s.toUpperCase();
  bpmEl.classList.toggle('locked', s === 'locked');
}

function avg(a)      { return a.length ? a.reduce((s, v) => s + v, 0) / a.length : 0; }
function stddev(a,m) { return Math.sqrt(a.reduce((s, v) => s + (v - m) ** 2, 0) / a.length); }

// FIX (VU) : fonction centralisée de mise à jour du VU meter
function updateVU(norm) {
  const pct = Math.min(norm * 100, 100);
  vuFill.style.width = pct + '%';
  if (norm <= 0) {
    dbLabel.textContent = '-∞ dB';
  } else {
    const db = 20 * Math.log10(norm);
    dbLabel.textContent = db.toFixed(1) + ' dB';
  }
}

function drawWave(buffer) {
  const dpr = window.devicePixelRatio || 1;
  const w   = canvas.width  = canvas.offsetWidth  * dpr;
  const h   = canvas.height = canvas.offsetHeight * dpr;
  cctx.clearRect(0, 0, w, h);
  cctx.beginPath();
  for (let i = 0; i < buffer.length; i++) {
    const x = (i / buffer.length) * w;
    const y = (buffer[i] * 0.5 + 0.5) * h;
    i === 0 ? cctx.moveTo(x, y) : cctx.lineTo(x, y);
  }
  cctx.strokeStyle = '#00e5ff'; cctx.lineWidth = 1.5 * dpr; cctx.stroke();
}

// FIX 6 : Math.min/max manuels pour éviter spread stack overflow sur grands tableaux
function drawAcorrGraph(vals, pIdx) {
  const dpr = window.devicePixelRatio || 1;
  const w   = acCanvas.width  = acCanvas.offsetWidth  * dpr;
  const h   = acCanvas.height = acCanvas.offsetHeight * dpr;
  acCtx.clearRect(0, 0, w, h);

  let minV = vals[0], maxV = vals[0];
  for (let i = 1; i < vals.length; i++) {
    if (vals[i] < minV) minV = vals[i];
    if (vals[i] > maxV) maxV = vals[i];
  }
  const range = maxV - minV || 1;

  acCtx.beginPath();
  for (let i = 0; i < vals.length; i++) {
    const x = (i / (vals.length - 1)) * w;
    const y = h - ((vals[i] - minV) / range) * h * 0.9 - h * 0.05;
    i === 0 ? acCtx.moveTo(x, y) : acCtx.lineTo(x, y);
  }
  acCtx.strokeStyle = '#00e5ff'; acCtx.stroke();

  const px = (pIdx / (vals.length - 1)) * w;
  const py = h - ((vals[pIdx] - minV) / range) * h * 0.9 - h * 0.05;
  acCtx.beginPath(); acCtx.arc(px, py, 4 * dpr, 0, Math.PI * 2);
  acCtx.fillStyle = '#39ff8a'; acCtx.fill();
}

// FIX (Beat Grid) : mise à jour de la grille circulaire à chaque beat
function updateBeatGrid() {
  histDots[beatGridPtr % HIST_COUNT].classList.add('active');
  // éteindre le dot le plus ancien (un tour de retard)
  histDots[(beatGridPtr + 1) % HIST_COUNT].classList.remove('active');
  beatGridPtr = (beatGridPtr + 1) % HIST_COUNT;
}

function triggerBeat(now) {
  lastBeat = lastOnsetTime = now;
  clearTimeout(flashTimeout);
  beatFlash.style.opacity = '1';
  flashTimeout = setTimeout(() => beatFlash.style.opacity = '0', 80);

  // FIX (Beat Grid) : allumer le prochain dot
  updateBeatGrid();

  beatTimes.push(now);
  if (beatTimes.length > 24) beatTimes.shift();
  if (beatTimes.length >= 6) {
    let intervals = [];
    for (let i = 1; i < beatTimes.length; i++) intervals.push(beatTimes[i] - beatTimes[i - 1]);
    const avgInt = avg(intervals);
    const bpm    = 60000 / avgInt;
    smoothedBpm  = smoothedBpm === null ? bpm : SMOOTH * smoothedBpm + (1 - SMOOTH) * bpm;
    bpmEl.textContent = Math.round(smoothedBpm);
    setUIState('tracking');
  }
}
</script>
